<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Roles Explorer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:#050510;color:#fff;min-height:100vh;overflow-x:hidden}

        /* BG */
        .bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
        .bg .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.06;animation:dft 25s ease-in-out infinite alternate}
        @keyframes dft{0%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,-90px) scale(1.4)}100%{transform:translate(-40px,70px) scale(0.7)}}

        /* HEADER */
        .hdr{position:relative;z-index:10;text-align:center;padding:16px;background:linear-gradient(135deg,#0a0020,#0d1b2a);border-bottom:2px solid #8b5cf6}
        .hdr h1{font-family:'Orbitron',sans-serif;font-size:1.8rem;background:linear-gradient(90deg,#00d4ff,#ff006e,#00ff88,#ffd700);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gs 4s ease infinite}
        @keyframes gs{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .hdr p{color:#555;font-size:0.75rem;margin-top:2px}

        /* TOP BAR */
        .tbar{position:sticky;top:0;z-index:100;display:flex;flex-wrap:wrap;justify-content:center;gap:6px;padding:10px 12px;background:rgba(8,5,22,0.97);backdrop-filter:blur(14px);border-bottom:1px solid #8b5cf622}
        .tb{padding:5px 14px;border-radius:18px;border:2px solid;background:0;font-family:'Poppins',sans-serif;font-weight:600;font-size:0.7rem;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.7px}
        .tb:hover{transform:scale(1.05);filter:brightness(1.3)}
        .tb.on{color:#000!important;transform:scale(1.04)}
        .tb[data-f="all"]{border-color:#0ff;color:#0ff}.tb[data-f="all"].on{background:#0ff;box-shadow:0 0 14px #0ff4}
        .tb[data-f="fullstack"]{border-color:#00d4ff;color:#00d4ff}.tb[data-f="fullstack"].on{background:#00d4ff;box-shadow:0 0 14px #0d4ff4}
        .tb[data-f="doctor"]{border-color:#00ff88;color:#00ff88}.tb[data-f="doctor"].on{background:#00ff88;box-shadow:0 0 14px #0ff884}
        .tb[data-f="law"]{border-color:#ff8c00;color:#ff8c00}.tb[data-f="law"].on{background:#ff8c00;box-shadow:0 0 14px #f8c004}
        .tb[data-f="bank"]{border-color:#ffd700;color:#ffd700}.tb[data-f="bank"].on{background:#ffd700;box-shadow:0 0 14px #fd7004}
        .tb[data-f="engineering"]{border-color:#8b5cf6;color:#8b5cf6}.tb[data-f="engineering"].on{background:#8b5cf6;color:#fff;box-shadow:0 0 14px #b5cf64}
        .tb[data-f="teaching"]{border-color:#ff006e;color:#ff006e}.tb[data-f="teaching"].on{background:#ff006e;color:#fff;box-shadow:0 0 14px #f006e4}
        .tb[data-f="civil"]{border-color:#ff6b6b;color:#ff6b6b}.tb[data-f="civil"].on{background:#ff6b6b;box-shadow:0 0 14px #f6b6b4}
        .tb[data-f="defence"]{border-color:#4ecdc4;color:#4ecdc4}.tb[data-f="defence"].on{background:#4ecdc4;box-shadow:0 0 14px #4ecdc4}
        .tb[data-f="arts"]{border-color:#f39c12;color:#f39c12}.tb[data-f="arts"].on{background:#f39c12;box-shadow:0 0 14px #39c124}
        .tb[data-f="science"]{border-color:#3498db;color:#3498db}.tb[data-f="science"].on{background:#3498db;color:#fff;box-shadow:0 0 14px #498db4}
        .tb[data-f="commerce"]{border-color:#e74c3c;color:#e74c3c}.tb[data-f="commerce"].on{background:#e74c3c;color:#fff;box-shadow:0 0 14px #74c3c4}
        .tb[data-f="nonvoice"]{border-color:#a29bfe;color:#a29bfe}.tb[data-f="nonvoice"].on{background:#a29bfe;color:#000;box-shadow:0 0 14px #29bfe4}

        /* LAYOUT */
        .lay{display:grid;grid-template-columns:170px 1fr 170px;position:relative;z-index:10}
        @media(max-width:860px){.lay{grid-template-columns:1fr}.lp,.rp{flex-direction:row!important;flex-wrap:wrap;justify-content:center;border:none!important;padding:8px!important}}
        .lp,.rp{display:flex;flex-direction:column;gap:5px;padding:14px 7px}
        .lp{background:linear-gradient(180deg,#00ff8806,#00d4ff06);border-right:1px solid #00ff8815}
        .rp{background:linear-gradient(180deg,#ff006e06,#ff8c0006);border-left:1px solid #ff006e15}
        .pt{font-family:'Orbitron',sans-serif;font-size:.6rem;text-transform:uppercase;letter-spacing:2px;text-align:center;padding-bottom:6px;margin-bottom:4px}
        .lp .pt{color:#00ff88;border-bottom:1px solid #00ff8820}
        .rp .pt{color:#ff006e;border-bottom:1px solid #ff006e20}
        .sb{padding:7px 9px;border:1px solid #ffffff0a;border-radius:8px;background:#ffffff03;color:#999;font-family:'Poppins',sans-serif;font-size:.7rem;cursor:pointer;transition:all .2s;text-align:center}
        .sb:hover{border-color:#ffffff22;transform:translateX(2px)}
        .lp .sb.on{background:linear-gradient(135deg,#00ff8812,#00d4ff12);border-color:#00ff88;color:#00ff88;box-shadow:0 0 8px #00ff8810}
        .rp .sb.on{background:linear-gradient(135deg,#ff006e12,#ff8c0012);border-color:#ff006e;color:#ff006e;box-shadow:0 0 8px #ff006e10}

        /* CONTENT */
        .cnt{padding:14px;min-height:55vh;overflow:hidden;position:relative}
        .sts{display:flex;justify-content:center;gap:18px;margin-bottom:12px;flex-wrap:wrap}
        .st{display:flex;align-items:center;gap:4px;font-size:.75rem;color:#666}
        .st b{font-family:'Orbitron',sans-serif;font-size:.95rem}
        .st:nth-child(1) b{color:#00d4ff}.st:nth-child(2) b{color:#00ff88}.st:nth-child(3) b{color:#ff006e}

        .zw{transform-origin:center top;transition:transform .3s}

        /* ==================== NORMAL VIEW ==================== */
        .grd{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}

        .cd{
            background:linear-gradient(145deg,#111130,#1a1a44);
            border:1px solid #ffffff0a;border-radius:14px;padding:16px;
            cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden;
            opacity:0;animation:pu .4s ease forwards;
        }
        .cd:hover{transform:translateY(-4px);box-shadow:0 12px 30px #00000080,0 0 18px #8b5cf610;border-color:#8b5cf633}
        @keyframes pu{from{opacity:0;transform:translateY(18px) scale(.94)}to{opacity:1;transform:none}}
        .cd .sp{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
        .cd .ic{font-size:1.6rem;margin-bottom:7px;display:block}
        .cd .nm{font-size:.95rem;font-weight:700;margin-bottom:4px}
        .cd .ql{font-size:.68rem;color:#777;margin-bottom:8px;line-height:1.3}
        .cd .sal{font-size:.62rem;color:#00ffcc;margin-bottom:7px;font-style:italic}
        .tgs{display:flex;flex-wrap:wrap;gap:3px}
        .tg{padding:2px 7px;border-radius:8px;font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
        .tg-sw{background:#00d4ff12;color:#00d4ff;border:1px solid #00d4ff25}
        .tg-hw{background:#ff8c0012;color:#ff8c00;border:1px solid #ff8c0025}
        .tg-gv{background:#00ff8812;color:#00ff88;border:1px solid #00ff8825}
        .tg-pv{background:#ff006e12;color:#ff006e;border:1px solid #ff006e25}
        .tg-sta{background:#ffd70012;color:#ffd700;border:1px solid #ffd70025}
        .tg-ctr{background:#8b5cf612;color:#8b5cf6;border:1px solid #8b5cf625}
        .tg-nv{background:#a29bfe12;color:#a29bfe;border:1px solid #a29bfe25}

        /* ==================== 3D VIEW — COMPLETELY DIFFERENT ==================== */
        .scene3d{
            width:100%;min-height:500px;
            perspective:1200px;
            display:flex;flex-wrap:wrap;justify-content:center;
            gap:40px;padding:40px 20px;
        }
        .cube-wrap{
            width:200px;height:240px;
            perspective:800px;
            cursor:pointer;
        }
        .cube{
            width:100%;height:100%;
            position:relative;
            transform-style:preserve-3d;
            transition:transform .1s ease;
            animation:autoRotate 12s ease-in-out infinite;
        }
        .cube-wrap:hover .cube{animation-play-state:paused}
        @keyframes autoRotate{
            0%{transform:rotateY(0deg) rotateX(5deg)}
            25%{transform:rotateY(15deg) rotateX(-5deg)}
            50%{transform:rotateY(0deg) rotateX(5deg)}
            75%{transform:rotateY(-15deg) rotateX(-5deg)}
            100%{transform:rotateY(0deg) rotateX(5deg)}
        }
        .cube-face{
            position:absolute;width:100%;height:100%;
            border-radius:16px;padding:16px;
            display:flex;flex-direction:column;
            backface-visibility:hidden;
            border:1px solid #ffffff15;
            overflow:hidden;
        }
        .cube-face::after{
            content:'';position:absolute;inset:0;border-radius:16px;
            background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 40%);
            pointer-events:none;
        }
        .face-front{
            background:linear-gradient(145deg,#0d0d2b,#1a1a50);
            transform:translateZ(30px);
        }
        .face-back{
            background:linear-gradient(145deg,#1a0d2b,#2a1a50);
            transform:rotateY(180deg) translateZ(30px);
        }
        .face-front .f-icon{font-size:2.2rem;margin-bottom:10px}
        .face-front .f-name{font-size:.9rem;font-weight:700;margin-bottom:5px}
        .face-front .f-qual{font-size:.65rem;color:#888;line-height:1.3;margin-bottom:8px}
        .face-front .f-sal{font-size:.6rem;color:#00ffcc;font-style:italic}
        .face-front .f-tags{margin-top:auto}

        .face-back .fb-title{font-family:'Orbitron',sans-serif;font-size:.7rem;color:#00d4ff;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
        .face-back .fb-roles{font-size:.68rem;color:#ccc;line-height:1.6}
        .face-back .fb-outfit{font-size:.65rem;color:#ffd700;margin-top:8px}
        .face-back .fb-sector{margin-top:auto;font-size:.6rem}

        .cube-shadow{
            position:absolute;bottom:-20px;left:10%;width:80%;height:20px;
            background:radial-gradient(ellipse,rgba(139,92,246,.2),transparent);
            border-radius:50%;filter:blur(8px);
            transition:all .3s;
        }
        .cube-wrap:hover .cube-shadow{
            background:radial-gradient(ellipse,rgba(139,92,246,.4),transparent);
            transform:scaleX(1.2);
        }
        .cube-glow{
            position:absolute;inset:-2px;border-radius:18px;
            transform-style:preserve-3d;
            opacity:0;transition:opacity .3s;
        }
        .cube-wrap:hover .cube-glow{opacity:1}
        .cube-glow::before{
            content:'';position:absolute;inset:0;border-radius:18px;
            background:conic-gradient(from 0deg,#00d4ff,#ff006e,#00ff88,#ffd700,#8b5cf6,#00d4ff);
            animation:spin 3s linear infinite;filter:blur(6px);opacity:.5;
            transform:translateZ(29px);
        }
        @keyframes spin{from{transform:translateZ(29px) rotate(0)}to{transform:translateZ(29px) rotate(360deg)}}

        /* ==================== 5D VIEW ==================== */
        .scene5d{perspective:2200px;display:flex;flex-wrap:wrap;justify-content:center;gap:28px;padding:30px 16px}
        .c5{width:170px;height:270px;position:relative;cursor:pointer;transform-style:preserve-3d;animation:orb5 7s ease-in-out infinite;transition:all .3s}
        .c5:nth-child(even){animation-delay:-3.5s}.c5:nth-child(3n){animation-delay:-2s}.c5:nth-child(5n){animation-delay:-5s}
        @keyframes orb5{0%,100%{transform:translateZ(0) rotateY(0) translateY(0)}25%{transform:translateZ(45px) rotateY(7deg) translateY(-18px)}50%{transform:translateZ(15px) rotateY(-4deg) translateY(-8px)}75%{transform:translateZ(55px) rotateY(-7deg) translateY(-22px)}}
        .c5:hover{animation-play-state:paused;transform:translateZ(90px) scale(1.12)!important;z-index:50}
        .c5-in{width:100%;height:100%;border-radius:16px;overflow:hidden;background:linear-gradient(180deg,#12123a,#1e1e50);border:1px solid #ffffff0c;box-shadow:0 8px 35px #00000080;display:flex;flex-direction:column;align-items:center;padding:12px 8px;text-align:center;position:relative}
        .c5:hover .c5-in{border-color:#8b5cf680;box-shadow:0 18px 55px #000000a0,0 0 35px #8b5cf630,0 0 70px #00d4ff15}
        .c5-in .gring{position:absolute;inset:-3px;border-radius:18px;background:conic-gradient(from 0deg,#00d4ff,#ff006e,#00ff88,#ffd700,#8b5cf6,#00d4ff);opacity:0;transition:opacity .3s;z-index:-1;animation:spin 3s linear infinite}
        .c5:hover .gring{opacity:1}
        .av5{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:6px;background:radial-gradient(circle,#8b5cf620,transparent);border:2px solid #ffffff12}
        .c5:hover .av5{border-color:#00d4ff60;box-shadow:0 0 18px #00d4ff40}
        .c5n{font-size:.72rem;font-weight:700;margin-bottom:3px;line-height:1.2}
        .c5q{font-size:.56rem;color:#888;line-height:1.2;margin-bottom:4px}
        .c5s{font-size:.54rem;color:#00ffcc;font-style:italic}
        .tt5{position:absolute;bottom:105%;left:50%;transform:translateX(-50%) scale(.8);background:rgba(8,5,22,.97);border:1px solid #8b5cf6;border-radius:12px;padding:10px 14px;min-width:210px;pointer-events:none;opacity:0;transition:all .25s;z-index:100;box-shadow:0 8px 35px #000000b0,0 0 18px #8b5cf625;backdrop-filter:blur(10px)}
        .c5:hover .tt5{opacity:1;transform:translateX(-50%) scale(1)}
        .tt5 .tn{font-family:'Orbitron',sans-serif;font-size:.75rem;color:#00d4ff;margin-bottom:3px}
        .tt5 .to{font-size:.65rem;color:#ffd700;margin-bottom:2px}
        .tt5 .tq{font-size:.63rem;color:#aaa;margin-bottom:2px}
        .tt5 .ts{font-size:.6rem;color:#00ff88}

        /* TREE */
        .tree{display:flex;flex-direction:column;align-items:center;padding:18px}
        .troot{display:inline-block;padding:10px 24px;border-radius:12px;background:linear-gradient(135deg,#8b5cf618,#00d4ff18);border:2px solid #8b5cf6;font-family:'Orbitron',sans-serif;font-size:.82rem;color:#0ff;margin-bottom:10px}
        .tconn{width:3px;height:16px;margin:0 auto;border-radius:2px}
        .tlvl{margin:6px 0;width:100%}
        .tlh{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;border-radius:10px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.78rem;transition:all .2s;user-select:none;margin:0 auto;width:fit-content;min-width:220px}
        .tlh:hover{filter:brightness(1.3);transform:scale(1.02)}
        .tlh .ar{transition:transform .25s;font-size:.65rem}
        .tlh.op .ar{transform:rotate(90deg)}
        .tli{display:none;margin-top:6px}
        .tlh.op+.tli{display:block}
        .tbr{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:8px 0}
        .tlf{background:#ffffff04;border:1px solid #ffffff08;border-radius:9px;padding:8px 12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;min-width:180px;max-width:260px}
        .tlf:hover{border-color:#8b5cf633;background:#8b5cf608;transform:translateY(-2px)}
        .tlf .li{font-size:1.2rem}.tlf .ln{font-size:.72rem;font-weight:600}.tlf .lq{font-size:.58rem;color:#777}

        .nrs{text-align:center;padding:40px;color:#555}
        .nrs .bi{font-size:3rem;margin-bottom:10px}
        .nrs h3{font-family:'Orbitron',sans-serif;color:#666}

        /* BOTTOM */
        .bb{position:sticky;bottom:0;z-index:100;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:8px;padding:10px 14px;background:rgba(8,5,22,.97);backdrop-filter:blur(14px);border-top:1px solid #8b5cf622}
        .vl{font-family:'Orbitron',sans-serif;font-size:.6rem;color:#555;text-transform:uppercase;letter-spacing:2px;margin-right:6px}
        .vb{padding:7px 18px;border:2px solid #ffffff12;border-radius:9px;background:#ffffff03;color:#888;font-family:'Poppins',sans-serif;font-weight:600;font-size:.7rem;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
        .vb:hover{border-color:#ffffff30;color:#ccc}
        .vb.on{border-color:#0ff;color:#0ff;background:#0ff008;box-shadow:0 0 12px #0ff15}
        .zi{font-size:.6rem;color:#444;margin-left:8px;font-family:'Orbitron',sans-serif}

        /* MODAL */
        .ov{position:fixed;inset:0;background:#000000e0;backdrop-filter:blur(8px);z-index:2000;display:none;justify-content:center;align-items:center;padding:12px}
        .ov.op{display:flex}
        .md{background:linear-gradient(145deg,#16163a,#0e0e28);border:1px solid #8b5cf640;border-radius:18px;max-width:680px;width:100%;max-height:85vh;overflow-y:auto;position:relative;animation:mi .35s cubic-bezier(.17,.67,.35,1.2);box-shadow:0 22px 60px #000000b0,0 0 35px #8b5cf615}
        @keyframes mi{from{opacity:0;transform:scale(.85) translateY(30px)}to{opacity:1;transform:none}}
        .md::-webkit-scrollbar{width:4px}.md::-webkit-scrollbar-thumb{background:#8b5cf6;border-radius:2px}
        .mhd{padding:22px 26px;border-bottom:1px solid #ffffff06;position:relative}
        .mhd .mst{position:absolute;top:0;left:0;right:0;height:4px;border-radius:18px 18px 0 0}
        .cx{position:absolute;top:10px;right:14px;width:34px;height:34px;border:1px solid #ffffff12;border-radius:50%;background:#ffffff04;color:#aaa;font-size:1rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center}
        .cx:hover{background:#ff006e20;border-color:#ff006e;color:#ff006e;transform:rotate(90deg)}
        .mci{font-size:2.4rem;display:block;margin-bottom:8px}
        .mct{font-family:'Orbitron',sans-serif;font-size:1.3rem;background:linear-gradient(90deg,#00d4ff,#ff006e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .mcs{color:#555;font-size:.75rem;margin-top:2px}
        .mbd{padding:22px 26px}
        .sc{margin-bottom:20px}
        .sct{font-family:'Orbitron',sans-serif;font-size:.65rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:7px}
        .sct .sln{flex:1;height:1px;background:linear-gradient(90deg,#8b5cf640,transparent)}
        .rl{display:flex;flex-direction:column;gap:5px}
        .rr{background:#ffffff03;border:1px solid #ffffff05;border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;transition:all .2s;font-size:.82rem}
        .rr:hover{border-color:#8b5cf625;transform:translateX(3px)}
        .rd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .rr:nth-child(1) .rd{background:#00d4ff;box-shadow:0 0 6px #00d4ff}
        .rr:nth-child(2) .rd{background:#00ff88;box-shadow:0 0 6px #00ff88}
        .rr:nth-child(3) .rd{background:#ff006e;box-shadow:0 0 6px #ff006e}
        .rr:nth-child(4) .rd{background:#ffd700;box-shadow:0 0 6px #ffd700}
        .rr:nth-child(5) .rd{background:#ff8c00;box-shadow:0 0 6px #ff8c00}
        .rr:nth-child(6) .rd{background:#8b5cf6;box-shadow:0 0 6px #8b5cf6}
        .bds{display:flex;flex-wrap:wrap;gap:7px}
        .bd{padding:7px 14px;border-radius:9px;font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:5px}
        .bd-s{background:#00d4ff10;border:1px solid #00d4ff28;color:#00d4ff}
        .bd-h{background:#ff8c0010;border:1px solid #ff8c0028;color:#ff8c00}
        .bd-g{background:#00ff8810;border:1px solid #00ff8828;color:#00ff88}
        .bd-p{background:#ff006e10;border:1px solid #ff006e28;color:#ff006e}
        .bd-st{background:#ffd70010;border:1px solid #ffd70028;color:#ffd700}
        .bd-ct{background:#8b5cf610;border:1px solid #8b5cf628;color:#8b5cf6}
        .bd-no{background:#ffffff05;border:1px solid #ffffff15;color:#888}
        .bd-nv{background:#a29bfe10;border:1px solid #a29bfe28;color:#a29bfe}
        .qb{background:linear-gradient(135deg,#8b5cf608,#00d4ff08);border:1px solid #8b5cf625;border-radius:12px;padding:14px}
        .qb .qm{font-size:1rem;font-weight:700;color:#0ff;margin-bottom:4px}
        .qb .qd{font-size:.75rem;color:#aaa;line-height:1.5}
        .stb{width:100%;border-collapse:separate;border-spacing:0 3px}
        .stb th{font-family:'Orbitron',sans-serif;font-size:.55rem;text-transform:uppercase;letter-spacing:1.5px;color:#777;padding:5px 8px;text-align:left}
        .stb td{padding:7px 10px;background:#ffffff03;font-size:.72rem}
        .stb tr td:first-child{border-radius:7px 0 0 7px;font-weight:600}
        .stb tr td:last-child{border-radius:0 7px 7px 0;color:#00ffcc;font-family:'Orbitron',sans-serif;font-size:.68rem}
        .tml{position:relative;padding-left:24px}

function mkBot(){const b=document.getElementById('bb');b.innerHTML='<span class="vl">👁️ View:</span>';[{k:'normal',l:'📋 Normal'},{k:'tree',l:'🌳 Tree'},{k:'3d',l:'🧊 3D'},{k:'5d',l:'✨ 5D'}].forEach(v=>{const btn=document.createElement('button');btn.className='vb'+(v.k===vM?' on':'');btn.textContent=v.l;btn.onclick=()=>{vM=v.k;b.querySelectorAll('.vb').forEach(x=>x.classList.remove('on'));btn.classList.add('on');zL=1;document.getElementById('zw').style.transform='scale(1)';doRender()};b.appendChild(btn)});const z=document.createElement('span');z.className='zi';z.id='zi';z.textContent='Zoom: 100%';b.appendChild(z)}

function fil(){return J.filter(j=>{if(fF!=='all'&&j.f!==fF)return false;if(fT==='software'&&j.t!=='software')return false;if(fT==='hardware'&&j.t!=='hardware')return false;if(fT==='both'&&j.t!=='both')return false;if(fT==='none'&&j.t!=='none')return false;if(fS==='private'&&j.s!=='private'&&j.s!=='both')return false;if(fS==='government'&&j.s!=='government'&&j.s!=='both')return false;if(fS==='state'&&j.g!=='state'&&j.g!=='both')return false;if(fS==='central'&&j.g!=='central'&&j.g!=='both')return false;if(fS==='both'&&j.s!=='both')return false;return true})}

function tgs(j){let h='';if(j.t==='software')h+='<span class="tg tg-sw">SW</span>';else if(j.t==='hardware')h+='<span class="tg tg-hw">HW</span>';else if(j.t==='both')h+='<span class="tg tg-sw">SW</span><span class="tg tg-hw">HW</span>';if(j.s==='government'||j.s==='both')h+='<span class="tg tg-gv">Govt</span>';if(j.s==='private'||j.s==='both')h+='<span class="tg tg-pv">Pvt</span>';if(j.g==='state')h+='<span class="tg tg-sta">State</span>';else if(j.g==='central')h+='<span class="tg tg-ctr">Central</span>';else if(j.g==='both')h+='<span class="tg tg-sta">State</span><span class="tg tg-ctr">Central</span>';if(j.nv)h+='<span class="tg tg-nv">Non-Voice</span>';return h}

function doRender(){
    const jobs=fil(),g=document.getElementById('grd'),st=document.getElementById('sts');
    st.innerHTML=`<div class="st"><b>${jobs.length}</b> Total</div><div class="st"><b>${jobs.filter(j=>j.s==='government'||j.s==='both').length}</b> Govt</div><div class="st"><b>${jobs.filter(j=>j.s==='private'||j.s==='both').length}</b> Pvt</div>`;
    if(!jobs.length){g.className='';g.innerHTML='<div class="nrs"><div class="bi">🔍</div><h3>No Jobs Found</h3><p>Change filters</p></div>';return}
    if(vM==='normal'){g.className='grd';rnCards(g,jobs)}
    else if(vM==='3d'){g.className='scene3d';rn3D(g,jobs)}
    else if(vM==='5d'){g.className='scene5d';rn5D(g,jobs)}
    else if(vM==='tree'){g.className='tree';rnTree(g,jobs)}
}

function rnCards(g,jobs){g.innerHTML='';jobs.forEach((j,i)=>{const c=document.createElement('div');c.className='cd';c.style.animationDelay=(i*.05)+'s';const cl=FC[j.f]||'#fff';c.innerHTML=`<div class="sp" style="background:linear-gradient(90deg,${cl},${cl}88)"></div><span class="ic">${j.ic}</span><div class="nm">${j.n}</div><div class="ql">${j.q}</div><div class="sal">💰 ${j.sa.j} → ${j.sa.e}</div><div class="tgs">${tgs(j)}</div>`;c.onclick=()=>opM(j);g.appendChild(c)})}

// ===== 3D CUBES — TOTALLY DIFFERENT FROM NORMAL =====
function rn3D(g,jobs){
    g.innerHTML='';
    jobs.forEach((j,i)=>{
        const w=document.createElement('div');w.className='cube-wrap';
        const cl=FC[j.f]||'#8b5cf6';
        w.innerHTML=`
            <div class="cube" style="animation-delay:${i*-0.8}s">
                <div class="cube-glow"></div>
                <div class="cube-face face-front" style="border-color:${cl}30">
                    <div class="f-icon">${j.ic}</div>
                    <div class="f-name" style="color:${cl}">${j.n}</div>
                    <div class="f-qual">${j.q}</div>
                    <div class="f-sal">💰 ${j.sa.j} → ${j.sa.e}</div>
                    <div class="f-tags tgs" style="margin-top:auto">${tgs(j)}</div>
                </div>
                <div class="cube-face face-back" style="border-color:${cl}30">
                    <div class="fb-title">ROLES</div>
                    <div class="fb-roles">${j.r.map(r=>'• '+r).join('<br>')}</div>
                    <div class="fb-outfit">${j.o}</div>
                    <div class="fb-sector" style="color:${cl}">${j.s==='government'?'🏛️ Government':j.s==='private'?'🏢 Private':'🔀 Both'}</div>
                </div>
            </div>
            <div class="cube-shadow"></div>
        `;

        // 3D mouse tracking
        const cube=w.querySelector('.cube');
        w.addEventListener('mousemove',e=>{
            const r=w.getBoundingClientRect();
            const x=(e.clientX-r.left)/r.width-.5;
            const y=(e.clientY-r.top)/r.height-.5;
            cube.style.transform=`rotateY(${x*50}deg) rotateX(${-y*40}deg)`;
            cube.style.transition='transform 0.05s ease';
        });
        w.addEventListener('mouseleave',()=>{
            cube.style.transition='transform 0.6s ease';
            cube.style.transform='';
            setTimeout(()=>{cube.style.transition='';},600);
        });
        w.onclick=()=>opM(j);
        g.appendChild(w);
    });
}

const QL=[
{k:'10th',l:'📗 10th Based Jobs',c:'#00d4ff',m:j=>/10th|12th/.test(j.q)&&!/Grad|B\.Tech|BCA|BA|BSc|BCom|LLB|MBBS|BDS|BFA|BJMC|Pharm/i.test(j.q)},
{k:'diploma',l:'📘 12th / Diploma / Foundation',c:'#00ff88',m:j=>/12th|Diploma|Foundation|CSEET/i.test(j.q)&&!/B\.Tech|MBBS/i.test(j.q)},
{k:'grad',l:'📙 Graduation Level',c:'#ffd700',m:j=>/B\.Tech|BCA|BA |BSc|BCom|BFA|BJMC|BA LLB|LLB|MBBS|BDS|Pharm|B\.V\.Sc|B\.Arch|B\.Des|Any Grad|Graduation/i.test(j.q)},
{k:'pg',l:'📕 Post Graduation / Specialization',c:'#ff8c00',m:j=>/M\.Tech|MCA|MSc|Master|MD|MS |LLM|MDS|M\.Pharm|PhD|NET|CA Final|CS Prof|CFA/i.test(j.q)},
{k:'exam',l:'📓 Competitive Exam Based',c:'#ff006e',m:j=>/UPSC|IBPS|SBI|RBI|NDA|CDS|CLAT|TET|CTET|NEET|JEE|GATE|SSB/i.test(j.q+' '+j.qd)}
];

function rnTree(g,jobs){
    g.innerHTML='';
    const root=document.createElement('div');root.style.cssText='text-align:center;margin-bottom:8px';
    root.innerHTML=`<div class="troot">🌳 Career Tree · ${jobs.length} Jobs</div>`;
    g.appendChild(root);
    const used=new Set();
    QL.forEach(ql=>{
        const matched=jobs.filter(j=>!used.has(j.id)&&ql.m(j));
        matched.forEach(j=>used.add(j.id));
        if(!matched.length)return;
        const conn=document.createElement('div');conn.className='tconn';conn.style.background=ql.c;g.appendChild(conn);
        const lv=document.createElement('div');lv.className='tlvl';
        const hd=document.createElement('div');hd.className='tlh op';hd.style.cssText=`background:${ql.c}12;border:1px solid ${ql.c}40;color:${ql.c}`;
        hd.innerHTML=`<span class="ar">▶</span> ${ql.l} (${matched.length})`;
        const items=document.createElement('div');items.className='tli';items.style.display='block';
        const br=document.createElement('div');br.className='tbr';
        matched.forEach(j=>{const lf=document.createElement('div');lf.className='tlf';lf.innerHTML=`<span class="li">${j.ic}</span><div><div class="ln">${j.n}</div><div class="lq">${j.q}</div></div>`;lf.onclick=()=>opM(j);br.appendChild(lf)});
        items.appendChild(br);
        hd.onclick=()=>{hd.classList.toggle('op');items.style.display=hd.classList.contains('op')?'block':'none'};
        lv.appendChild(hd);lv.appendChild(items);g.appendChild(lv);
    });
    const rest=jobs.filter(j=>!used.has(j.id));
    if(rest.length){const conn=document.createElement('div');conn.className='tconn';conn.style.background='#aaa';g.appendChild(conn);const lv=document.createElement('div');lv.className='tlvl';const hd=document.createElement('div');hd.className='tlh op';hd.style.cssText='background:#ffffff08;border:1px solid #ffffff20;color:#aaa';hd.innerHTML=`<span class="ar">▶</span> 📂 Other (${rest.length})`;const items=document.createElement('div');items.className='tli';items.style.display='block';const br=document.createElement('div');br.className='tbr';rest.forEach(j=>{const lf=document.createElement('div');lf.className='tlf';lf.innerHTML=`<span class="li">${j.ic}</span><div><div class="ln">${j.n}</div><div class="lq">${j.q}</div></div>`;lf.onclick=()=>opM(j);br.appendChild(lf)});items.appendChild(br);hd.onclick=()=>{hd.classList.toggle('op');items.style.display=hd.classList.contains('op')?'block':'none'};lv.appendChild(hd);lv.appendChild(items);g.appendChild(lv)}
}

// ===== MODAL =====
function opM(j){
    const ov=document.getElementById('ov'),m=document.getElementById('md'),cl=FC[j.f]||'#8b5cf6';
    let tB='';if(j.t==='software')tB='<div class="bd bd-s">💾 Software</div>';else if(j.t==='hardware')tB='<div class="bd bd-h">🔧 Hardware</div>';else if(j.t==='both')tB='<div class="bd bd-s">💾 SW</div><div class="bd bd-h">🔧 HW</div>';else tB='<div class="bd bd-no">📋 Service</div>';if(j.nv)tB+='<div class="bd bd-nv">🤫 Non-Voice</div>';
    let sB='';if(j.s==='private')sB='<div class="bd bd-p">🏢 Private</div>';else if(j.s==='government'){sB='<div class="bd bd-g">🏛️ Govt</div>';if(j.g==='state')sB+='<div class="bd bd-st">🗺️ State</div>';else if(j.g==='central')sB+='<div class="bd bd-ct">🇮🇳 Central</div>';else if(j.g==='both')sB+='<div class="bd bd-st">🗺️ State</div><div class="bd bd-ct">🇮🇳 Central</div>'}else if(j.s==='both'){sB='<div class="bd bd-g">🏛️ Govt</div><div class="bd bd-p">🏢 Private</div>';if(j.g==='state')sB+='<div class="bd bd-st">🗺️ State</div>';else if(j.g==='central')sB+='<div class="bd bd-ct">🇮🇳 Central</div>';else if(j.g==='both')sB+='<div class="bd bd-st">🗺️ State</div><div class="bd bd-ct">🇮🇳 Central</div>'}
    m.innerHTML=`<div class="mhd"><div class="mst" style="background:linear-gradient(90deg,${cl},${cl}88)"></div><button class="cx" id="cx">✕</button><span class="mci">${j.ic}</span><h2 class="mct">${j.n}</h2><p class="mcs">${FN[j.f]||j.f} · ${j.o}</p></div><div class="mbd"><div class="sc"><div class="sct" style="color:#00d4ff">👤 Roles<div class="sln"></div></div><div class="rl">${j.r.map(r=>`<div class="rr"><div class="rd"></div><span>${r}</span></div>`).join('')}</div></div><div class="sc"><div class="sct" style="color:#ff8c00">⚡ Type<div class="sln"></div></div><div class="bds">${tB}</div></div><div class="sc"><div class="sct" style="color:#00ff88">🏢 Sector<div class="sln"></div></div><div class="bds">${sB}</div></div><div class="sc"><div class="sct" style="color:#ffd700">🎓 Qualification<div class="sln"></div></div><div class="qb"><div class="qm">${j.q}</div><div class="qd">${j.qd}</div></div></div><div class="sc"><div class="sct" style="color:#00ffcc">💰 Salary Range<div class="sln"></div></div><table class="stb"><tr><th>Level</th><th>Experience</th><th>Salary</th></tr><tr><td>🟢 Intern</td><td>0 yr</td><td>${j.sa.i}</td></tr><tr><td>🔵 Junior</td><td>1-3 yr</td><td>${j.sa.j}</td></tr><tr><td>🟡 Senior</td><td>4-8 yr</td><td>${j.sa.s}</td></tr><tr><td>🟠 Expert</td><td>8-15 yr</td><td>${j.sa.e}</td></tr><tr><td>🔴 Professional</td><td>15+ yr</td><td>${j.sa.p}</td></tr></table></div><div class="sc"><div class="sct" style="color:#ff006e">🛤️ Journey<div class="sln"></div></div><div class="tml">${j.jr.map(s=>`<div class="stp"><div class="sl">${s.l}</div><div class="stt">${s.t}</div><div class="sd">${s.d}</div><div class="sdr">⏱️ ${s.dr}</div></div>`).join('')}</div></div></div>`;
    ov.classList.add('op');document.body.style.overflow='hidden';document.getElementById('cx').onclick=clM;
}
function clM(){document.getElementById('ov').classList.remove('op');document.body.style.overflow='auto'}
function mkModal(){document.getElementById('ov').onclick=function(e){if(e.target===this)clM()};document.addEventListener('keydown',e=>{if(e.key==='Escape')clM()})}
</script>
</body>
